name: Deploy static content to Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      # Tell GitHub to go inside the inner folder for these steps
      - name: Install dependencies
        working-directory: ./leo_portfolio
        run: npm install
        
      - name: Build
        working-directory: ./leo_portfolio
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      # Tell GitHub where to find the finished dist folder
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './leo_portfolio/dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4